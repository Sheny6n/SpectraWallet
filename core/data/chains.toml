# Spectra chain registry — single source of truth for chain metadata.
# Replaces: ChainWikiEntries.json, ChainVisualRegistry.json,
#   app_chain_descriptors() in app_core.rs, chainSelectionDescriptors in
#   WalletSetupViews.swift, TokenTrackingChain.tokenStandard/.contractAddressPrompt.
#
# Ordered by chain_id (= Chain enum discriminant in registry.rs).
# The chain_id values are part of the persistence wire format — never renumber.
# To add a chain: append at the end with the next unused chain_id.

# ── Bitcoin (0) ───────────────────────────────────────────────────────────────

[[chains]]
id                       = "bitcoin"
name                     = "Bitcoin"
symbol                   = "BTC"
gas_token_symbol         = "BTC"
search_keywords          = ["Bitcoin", "BTC"]
category                 = "bitcoin-family"
is_evm                   = false
supports_endpoint_catalog = true
color_name               = "orange"
asset_name               = "bitcoin"
token_standard           = ""
contract_address_prompt  = ""
tags                     = ["UTXO", "PoW", "Settlement"]
family                   = "UTXO / base-layer settlement network"
consensus                = "Proof of Work (SHA-256)"
state_model              = "UTXO set"
primary_use              = "Final settlement, long-horizon self-custody, and simple native BTC transfers."
slip44_coin_type         = "0 (Bitcoin)"
derivation_path          = "m/84'/0'/0'/0/0"
alt_derivation_path      = ""
total_circulation_model  = "Protocol-capped at 21,000,000 BTC."
native_coingecko_id        = "bitcoin"
native_decimals             = 8
native_asset_name           = "Bitcoin"
supports_diagnostics        = true
notable_details          = [
  "Spectra uses a native Bitcoin engine rather than the generic WalletCore path helper.",
  "The default receive path shown here is native SegWit BIP84 account 0.",
  "Balance is fundamentally derived from spendable UTXO state, not an account balance field.",
]

