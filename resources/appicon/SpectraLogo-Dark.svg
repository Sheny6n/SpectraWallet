<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7f1d1d"/>
      <stop offset="20%"  stop-color="#7c2d12"/>
      <stop offset="40%"  stop-color="#713f12"/>
      <stop offset="60%"  stop-color="#14532d"/>
      <stop offset="80%"  stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <linearGradient id="dark-veil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.52"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.98"/>
      <stop offset="30%"  stop-color="#fff" stop-opacity="0.82"/>
      <stop offset="65%"  stop-color="#fff" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.32"/>
    </linearGradient>
    <filter id="drop" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2"
                    flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#dark-veil)"/>

  <g transform="rotate(-8, 32, 32)" filter="url(#drop)">
    <text x="32" y="32"
          text-anchor="middle" dominant-baseline="central"
          font-family="-apple-system, Helvetica Neue, sans-serif"
          font-weight="600" font-size="40"
          fill="url(#glass)">S</text>
  </g>
</svg>
